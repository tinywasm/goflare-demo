name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.2'

      - name: Install goflare
        # go install compila desde source (~30-90s). Migrar a gh release download
        # cuando tinywasm/goflare publique GitHub Releases via gorelease (~2-5s).
        # goflare build llama tinygo.EnsureInstalled() internamente —
        # instala TinyGo 0.41.1 automáticamente si no está presente.
        run: go install github.com/tinywasm/goflare/cmd/goflare@latest

      - name: Build
        run: goflare build

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: goflare deploy
