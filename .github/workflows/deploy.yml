name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

# Pushes seguidos a main (merge del PR + "chore: sync") lanzarían 2 deploys.
# Solo interesa desplegar el último commit: cancela runs en curso del mismo ref.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.2'

      - name: Install goflare
        # go install compila desde source (~30-90s). Migrar a gh release download
        # cuando tinywasm/goflare publique GitHub Releases via gorelease (~2-5s).
        # goflare build llama tinygo.EnsureInstalled() internamente —
        # instala TinyGo 0.41.1 automáticamente si no está presente.
        run: go install github.com/tinywasm/goflare/cmd/goflare@latest

      - name: Build
        run: goflare build

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: goflare deploy

  e2e:
    needs: deploy
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      D1_DATABASE_ID: ${{ vars.D1_DATABASE_ID }}
      DEMO_URL: https://goflare-demo.tinywasm.app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Wait for Pages deployment
        run: sleep 30

      - name: E2E — POST contact form
        run: |
          STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X POST "$DEMO_URL/api/contacto" \
            -H "Content-Type: application/json" \
            -d '{"nombre":"CI Test","email":"ci@goflare-demo.test","mensaje":"Automated e2e test submission from CI pipeline"}' || true)
          cat /tmp/resp.json
          [ "$STATUS" = "200" ] || (echo "Expected 200, got $STATUS" && exit 1)

      - name: E2E — Verify D1 record
        run: go test -tags=integration -run TestE2E_ContactSubmission ./tests/e2e/ -v
